spring:
  application:
    name: guesscolleague

  datasource:
    url: jdbc:postgresql://localhost:5432/guess_colleague
    username: admin
    password: admin123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update  # Изменено с 'validate' на 'update'
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true  # Включим для отладки

  flyway:
    enabled: false  # Временно отключаем Flyway
    baseline-on-migrate: true

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:YOUR_BOT_TOKEN_HERE}
    username: ${TELEGRAM_BOT_USERNAME:GuessColleagueBot}

server:
  port: 8080

logging:
  level:
    com.wft.guesscolleague: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE